<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualitātes | Gramzdas iedzīvotāju padome</title>
    <link rel="stylesheet" href="aktualitates.css">
</head>
<body>

    <header class="hero small-hero">
        <div class="hero-content">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Atpakaļ uz sākumu</a>
            <h1>Aktualitātes</h1>
            <p>Viss svarīgais, kas notiek Gramzdā.</p>
        </div>
    </header>

    <main class="scroll-container">
        <div class="container">
            <div class="news-grid">
                <!-- Šeit ielādēsies ziņas -->
                <div class="news-card loading-card">
                    <div class="news-content">
                        <h3>Ielādēju jaunumus...</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Uznirstošais logs (Modal) ziņas lasīšanai -->
    <div id="news-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-header">
                <span id="modal-date" class="news-date"></span>
                <span id="modal-category" class="news-tag"></span>
            </div>
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Gramzdas iedzīvotāju padome. Izstrādāts iedzīvotāju interesēs.</p>
    </footer>

    <script src="scripts/utils.js" defer></script>
    <script src="scripts/aktualitates.js" defer></script>
</body>
</html>
