<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gramzdas iedzīvotāju padomes ideju siena. Iesniedz savu ideju pagasta attīstībai un balso par citām.">
    
    <!-- Sociālo tīklu meta tagi -->
    <meta property="og:title" content="Idejas | Gramzdas iedzīvotāju padome">
    <meta property="og:description" content="Iesniedz savu ideju pagasta attīstībai un balso par citām iedzīvotāju idejām.">
    <meta property="og:image" content="https://dawis86.github.io/Ipadome_Gramzda/prezentacijas/2026-marts/padomes_locekli.jpg">
    <meta property="og:url" content="https://dawis86.github.io/Ipadome_Gramzda/idejas.html">
    <meta property="og:type" content="website">

    <title>Idejas | Gramzdas iedzīvotāju padome</title>
    <link rel="stylesheet" href="idejas.css">
</head>
<body>

    <header class="hero small-hero">
        <div class="hero-content">
            <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Atpakaļ uz sākumu</a>
            <h1>Ideju siena</h1>
            <p>Tava ideja var mainīt Gramzdu. Pieliec to pie sienas!</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="scroll-container">
        <div class="container">
            <!-- TOP 3 IDEJAS -->
            <div class="top-ideas-container">
                <h2><i class="fa-solid fa-fire" style="color: var(--gold);"></i> Populārākās idejas</h2>
                <div class="top-ideas-grid" id="top-ideas-grid"></div>
            </div>

            <div class="board" id="board">
                <!-- Add Idea Button -->
                <a href="https://docs.google.com/forms/d/1NftgE1gc7VgyEfLfr16A9agBrTzBmPt7YgZHAF0fSRw/viewform" target="_blank" class="note add-note">
                    <i class="fa-solid fa-plus"></i>
                    <h3>Pievienot ideju</h3>
                </a>

                <!-- Loading Indicator -->
                <div id="loading-indicator" class="note loading-note">
                    <p>Ielādēju jaunas idejas...</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gramzdas iedzīvotāju padome. Izstrādāts iedzīvotāju interesēs.</p>
    </footer>

    <!-- Firebase bibliotēkas -->
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-database-compat.js"></script>

    <script src="scripts/utils.js" defer></script>
    <script src="scripts/idejas.js" defer></script>
</body>
</html>
